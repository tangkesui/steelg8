<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>steelg8 mermaid sandbox</title>
<style>
  html, body { margin: 0; padding: 0; background: transparent; color: #1d1d1f; }
  body { padding: 6px 8px; font: 13px -apple-system, "SF Pro Text", "PingFang SC", sans-serif; }
  #root svg { max-width: 100%; height: auto; display: block; }
  .mermaid-error { color: #b91c1c; font: 12px ui-monospace, SFMono-Regular, monospace;
    white-space: pre-wrap; word-break: break-all; }
</style>
<!--
  这个 frame 只做一件事：把父页面 postMessage 过来的 mermaid 源码渲染成 SVG，
  渲染结果留在本 frame 内部 —— 父页不会拿到原始 HTML / SVG，只拿一个高度。

  父页用 <iframe sandbox="allow-scripts">（没有 allow-same-origin）嵌入：
  - 本 iframe 拿到的是 opaque origin，触不到 parent.cookie / window.STEELG8_KERNEL
    等敏感对象，也不能 fetch 同源 API。
  - mermaid.min.js 是 <script src> 加载的子资源，浏览器允许加载（不受 origin 限制）。
  - 即便未来 mermaid 出 XSS，影响半径也被限制在 frame 自己里。
-->
<script src="vendor/mermaid.min.js"></script>
</head>
<body>
<div id="root" aria-live="polite"></div>
<script>
(function () {
  "use strict";
  function isDark() {
    try { return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches; }
    catch (_) { return false; }
  }
  var root = document.getElementById("root");

  if (!window.mermaid) {
    try { parent.postMessage({ type: "mermaid:error", error: "mermaid 未加载" }, "*"); } catch (_) {}
    return;
  }

  try {
    window.mermaid.initialize({
      startOnLoad: false,
      securityLevel: "strict",
      theme: isDark() ? "dark" : "default",
      fontFamily: "-apple-system, 'SF Pro Text', 'PingFang SC', sans-serif",
    });
  } catch (_) {}

  function reportHeight(id) {
    var rect = root.getBoundingClientRect();
    var h = Math.max(40, Math.ceil(rect.height) + 12);
    try { parent.postMessage({ type: "mermaid:rendered", id: id, height: h }, "*"); } catch (_) {}
  }

  function showError(id, source, err) {
    root.innerHTML = "";
    var pre = document.createElement("pre");
    pre.className = "mermaid-error";
    var msg = (err && err.message) ? err.message : String(err);
    pre.textContent = "Mermaid 渲染失败：\n" + msg + "\n\n源：\n" + source;
    root.appendChild(pre);
    reportHeight(id);
  }

  window.addEventListener("message", function (ev) {
    var data = ev && ev.data;
    if (!data || data.type !== "mermaid:render") return;
    var id = String(data.id || "mmd");
    var src = String(data.source || "");
    if (!src) {
      showError(id, "", "源码为空");
      return;
    }
    try {
      var p = window.mermaid.render("m_" + id.replace(/[^a-zA-Z0-9_-]/g, "_"), src);
      Promise.resolve(p)
        .then(function (out) {
          var svg = (out && out.svg) || "";
          root.innerHTML = svg;
          reportHeight(id);
        })
        .catch(function (err) { showError(id, src, err); });
    } catch (err) {
      showError(id, src, err);
    }
  });

  // 通知父页：sandbox 就绪，可以发渲染请求了
  try { parent.postMessage({ type: "mermaid:ready" }, "*"); } catch (_) {}
})();
</script>
</body>
</html>
