<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>steelg8 · Chat</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="brand">
      <span class="logo">⚒</span>
      <span class="name">steelg8</span>
      <span class="slogan">让文案工作者不用再求任何人</span>
    </div>
    <div class="controls">
      <div id="project-pill" class="project-pill" title="当前激活项目">
        <span class="project-icon">📁</span>
        <span id="project-name" class="project-name">未选项目</span>
        <span id="project-chunks" class="project-chunks"></span>
      </div>
      <div id="usage-pill" class="usage-pill" title="本次会话 / 今日 累计">
        <span class="usage-main">$0.0000</span>
        <span class="usage-sub">· 0 tok</span>
      </div>
      <label class="model-label">
        <span>模型</span>
        <select id="model-picker">
          <option value="">自动路由</option>
        </select>
      </label>
      <button id="reload-providers" title="刷新 provider 列表">↻</button>
      <div id="health-dot" class="dot dot-off" title="内核状态"></div>
    </div>
  </header>

  <div class="body">
    <aside id="scratch" class="scratch" data-mode="sidebar">
      <section id="sidebar-project" class="sidebar-project">
        <div class="sp-head">
          <span class="sp-title">📁 项目</span>
          <button id="project-open-btn" class="sp-btn" title="选文件夹当项目">打开…</button>
        </div>
        <div id="sp-body" class="sp-body sp-empty">
          <div class="sp-hint">还没选项目。点「打开…」选一个文件夹，steelg8 会索引里面的 .md / .txt 供对话引用。</div>
        </div>
      </section>

      <div class="sp-divider"></div>

      <div class="scratch-head">
        <span class="scratch-title">📝 便签</span>
        <span id="scratch-save-state" class="scratch-save-state"></span>
        <button id="scratch-toggle" class="scratch-toggle" title="收起 / 展开">⟨</button>
      </div>
      <textarea id="scratch-note" class="scratch-note"
                placeholder="随手记…&#10;&#10;自动保存，不怕丢。&#10;⌘⇧N 从任何地方呼出。"></textarea>
      <div class="scratch-footer">
        <button id="scratch-to-notes"
                title="便签本身已自动保存在本机。点这个是把内容复制一份到 Apple 备忘录的 steelg8 文件夹，iCloud 会同步到你的 iPhone / iPad。">📤 同步到 iPhone</button>
        <button id="scratch-clear" class="secondary" title="清空本机便签（已同步到备忘录的不受影响）">清空</button>
      </div>
    </aside>

    <main class="chat-col">
      <div id="messages" class="messages">
        <div class="welcome">
          <h2>欢迎回来</h2>
          <p>有什么要让我干的？直接说。</p>
          <div class="hints">
            <button data-prompt="帮我写一段产品发布的推文，100 字左右">产品推文</button>
            <button data-prompt="把下面这段中文翻译成英文：\n\n我们的目标是把文案工作者从模型厂商手里解放出来。">翻译任务</button>
            <button data-prompt="用 mermaid flowchart 画一个 steelg8 的架构图">架构图</button>
          </div>
        </div>
      </div>

      <footer class="composer">
        <div class="status-bar">
          <span id="routing-hint" class="routing-hint"></span>
          <span id="error-hint" class="error-hint"></span>
        </div>
        <div class="input-row">
          <textarea id="input" rows="2" placeholder="输入消息，⌘/Ctrl + Enter 发送"></textarea>
          <button id="send" class="send-btn">发送</button>
        </div>
      </footer>
    </main>

    <section id="canvas" class="canvas" data-mode="closed">
      <div class="canvas-head">
        <span class="canvas-title">🖼️ Canvas</span>
        <div class="canvas-modes" role="tablist">
          <button data-canvas-mode="preview" class="canvas-mode active" title="预览">预览</button>
          <button data-canvas-mode="source" class="canvas-mode" title="源码">源码</button>
          <button data-canvas-mode="split" class="canvas-mode" title="分栏">分栏</button>
        </div>
        <div class="canvas-actions">
          <button id="canvas-copy" title="复制内容">📋</button>
          <button id="canvas-send-chat" title="发送到对话">📤</button>
          <button id="canvas-close" title="关闭 Canvas">×</button>
        </div>
      </div>
      <div class="canvas-body">
        <div id="canvas-preview" class="canvas-preview"></div>
        <textarea id="canvas-source" class="canvas-source" spellcheck="false"
                  placeholder="Canvas 源码（Markdown + ```mermaid 代码块 + 代码片段）"></textarea>
      </div>
      <div class="canvas-foot">
        <span id="canvas-source-hint" class="canvas-source-hint">—</span>
      </div>
    </section>
  </div>
</div>

<!-- Mermaid 本地打包（不走 CDN，打开 app 即用） -->
<script src="vendor/mermaid.min.js"></script>

<script src="markdown.js"></script>
<script src="canvas.js"></script>
<script src="chat.js"></script>
</body>
</html>
